<!doctype html>
<html lang="en" data-color-mode="light" data-light-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Monitor Logs Cost Calculator</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        background-color: var(--bgColor-default, #ffffff);
        color: var(--fgColor-default, #1f2328);
        margin: 0;
        padding: 0;
      }
      .container-lg {
        max-width: 1012px;
        margin: 0 auto;
        padding: 0 16px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      table th, table td {
        border-bottom: 1px solid var(--borderColor-default, #d0d7de);
      }
      table thead th {
        background: var(--bgColor-muted, #f6f8fa);
      }
      .text-mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 0.85em; }
      .text-right { text-align: right; }
      .text-left { text-align: left; }
      input[type="range"] { cursor: pointer; }

      /* Responsive: stack on small screens */
      @media (max-width: 768px) {
        .d-flex.flex-wrap { gap: 12px !important; }
        .container-lg { padding: 0 8px; }
        table { font-size: 0.85em; }
        table th, table td { padding: 4px 6px !important; }
      }
    </style>
  </head>
  <body>
    <div class="color-bg-subtle border-bottom" style="position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); background: rgba(246, 248, 250, 0.92);">
      <div class="container-lg d-flex flex-items-center flex-justify-between py-2">
        <div class="d-flex flex-items-center" style="gap: 8px;">
          <button class="btn-octicon" id="copy-link" title="Copy shareable URL" style="padding: 4px;">🔗</button>
          <h1 class="h3 mb-0">Azure Monitor Logs Cost Calculator</h1>
        </div>
        <div class="d-flex flex-items-center" style="gap: 20px;">
          <div class="text-right" style="line-height: 1.2;">
            <span class="text-small color-fg-muted">Monthly</span><br>
            <span class="d-flex flex-items-center" style="gap: 6px;">
              <strong class="f3 text-mono" id="sticky-total-value">—</strong>
              <span id="sticky-total-b" style="display: none; color: #bf8700;">
                vs <strong class="f4 text-mono" id="sticky-total-b-value">—</strong>
              </span>
            </span>
          </div>
          <div class="text-right" style="line-height: 1.2;">
            <span class="text-small color-fg-muted">Annual</span><br>
            <span class="d-flex flex-items-center" style="gap: 6px;">
              <strong class="f3 text-mono" id="sticky-annual-value">—</strong>
              <span id="sticky-annual-b" style="display: none; color: #bf8700;">
                vs <strong class="f4 text-mono" id="sticky-annual-b-value">—</strong>
              </span>
            </span>
          </div>
        </div>
      </div>
    </div>

    <div class="container-lg pb-4 pt-3">
      <div id="global-settings"></div>

      <details open>
        <summary class="h4 mb-2 py-2" style="cursor: pointer; list-style: revert;">📊 Ingestion</summary>
        <div id="volume-config"></div>
      </details>

      <details open>
        <summary class="h4 mb-2 py-2" style="cursor: pointer; list-style: revert;">🗄️ Retention</summary>
        <div id="retention-config"></div>
      </details>

      <details>
        <summary class="h4 mb-2 py-2" style="cursor: pointer; list-style: revert;">🔍 Query &amp; Export Costs</summary>
        <div id="query-export"></div>
      </details>

      <details id="scenario-section">
        <summary class="h4 mb-2 py-2" style="cursor: pointer; list-style: revert;">🅱️ Compare Scenario B</summary>
        <div class="mb-3 p-2">
          <label class="d-flex flex-items-center" style="gap: 8px; cursor: pointer;">
            <input type="checkbox" id="scenario-toggle">
            <span class="text-small color-fg-muted">Enable to override specific inputs and compare two scenarios side-by-side</span>
          </label>
        </div>
        <div id="scenario-b-panel" style="display: none;"></div>
      </details>

      <details open>
        <summary class="h4 mb-2 py-2" style="cursor: pointer; list-style: revert;">💰 Results</summary>
        <div id="cost-summary"></div>
        <div id="charts"></div>
        <div id="projection-table"></div>
      </details>

      <footer class="py-3 mt-3 border-top text-small color-fg-muted text-center">
        <span id="pricing-date-note"></span>
        <br>
        Source: <a href="https://azure.microsoft.com/en-us/pricing/details/monitor/" target="_blank" class="color-fg-muted">Azure Monitor Pricing</a>
        · <a href="https://prices.azure.com/api/retail/prices" target="_blank" class="color-fg-muted">Azure Retail Pricing API</a>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
