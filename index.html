<!doctype html>
<html lang="en" data-color-mode="light" data-light-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Monitor Logs Cost Calculator</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        background-color: var(--bgColor-default, #ffffff);
        color: var(--fgColor-default, #1f2328);
        margin: 0;
        padding: 0;
      }
      .container-lg {
        max-width: 1012px;
        margin: 0 auto;
        padding: 0 16px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      table th, table td {
        border-bottom: 1px solid var(--borderColor-default, #d0d7de);
      }
      table thead th {
        background: var(--bgColor-muted, #f6f8fa);
      }
      .text-mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 0.85em; }
      .text-right { text-align: right; }
      .text-left { text-align: left; }
      input[type="range"] { cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="color-bg-subtle border-bottom mb-4">
      <div class="container-lg d-flex flex-items-center flex-justify-between py-3">
        <div>
          <h1 class="h2 mb-0">Azure Monitor Logs Cost Calculator</h1>
          <p class="color-fg-muted mb-0 text-small">Budget logging costs with plan splits, retention, growth projections &amp; internal discount</p>
        </div>
        <button class="btn" id="copy-link" title="Copy shareable URL with all current settings">
          🔗 Copy Link
        </button>
      </div>
    </div>

    <div class="container-lg pb-4">
      <div id="global-settings"></div>
      <div id="volume-config"></div>
      <div id="retention-config"></div>
      <div id="query-export"></div>
      <div id="cost-summary"></div>
      <div id="projection-table"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
